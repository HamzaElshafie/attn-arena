name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install package and tooling
        run: uv sync --extra dev --extra test

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy attn_arena

      - name: Unit and integration tests
        run: pytest -m "not gpu and not correctness"
